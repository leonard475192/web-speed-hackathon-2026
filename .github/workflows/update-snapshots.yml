name: Update VRT Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update snapshots on"
        required: true
        default: "main"

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: application/pnpm-lock.yaml
      - run: cd application && pnpm install --frozen-lockfile
      - run: cd application && pnpm run build
      - run: cd application && pnpm --filter @web-speed-hackathon-2026/e2e exec playwright install --with-deps chrome
      - name: Start server and update snapshots
        run: |
          cd application && pnpm run start &
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          cd application/e2e && pnpm run test --update-snapshots
      - name: Commit and push updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "application/e2e/**/*.png"
          git diff --cached --quiet || git commit -m "chore: update VRT snapshots for Linux"
          git push
